<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Recepcionista APAE</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }


    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f6f9;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e4e8ef;
      border-radius: 12px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .07);
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
    }

    a {
      display: inline-block;
      padding: 8px 20px;
      background: #06b6d4;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    a:hover {
      background: #0891b2;
    }



    @media (min-width: 1400px) {
      .card {
        max-width: 500px;
        padding: 44px 52px;
      }
    }

    @media (max-width: 480px) {

      .card {
        padding: 28px 20px;
      }

      h1 {
        font-size: 17px;
      }
    }


    @media (max-width: 360px) {

      .card {
        padding: 22px 14px;
      }

      h1 {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Portal — Recepcionista</h1>
    <p>Módulo em desenvolvimento.</p>
    <a href="../../index.html">Sair</a>
  </div>
</body>

</html>

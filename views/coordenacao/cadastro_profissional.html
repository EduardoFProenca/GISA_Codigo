<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Profissional — Coordenação APAE</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../css/gisa.css" />
  <style>
    /* Estilos extras apenas para garantir o alinhamento dos novos campos automáticos */
    .field-group {
      display: flex;
      gap: 8px;
    }

    .field-group input {
      flex: 1;
    }

    .gen-btn {
      background: #e2e8f0;
      border: none;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .gen-btn:hover {
      background: #cbd5e1;
    }

    /* ── Estilização de campos desabilitados (Modo Visualização) ── */
    input:disabled,
    select:disabled {
      background-color: #f1f5f9 !important;
      /* Cinza claro suave */
      color: #475569 !important;
      /* Texto cinza escuro legível */
      border-color: #cbd5e1 !important;
      /* Borda suavizada */
      cursor: not-allowed !important;
      /* Cursor de bloqueio */
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <a class="back-btn" href="dashboard.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          <span>Voltar</span>
        </a>
        <div>
          <h1>Cadastrar Novo Profissional</h1>
          <p>Adicionar ao corpo clínico</p>
        </div>
      </div>
      <button class="save-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        <span>Salvar Cadastro</span>
      </button>
    </div>
  </header>

  <div class="form-main">
    <div class="form-card">

      <div class="form-section">
        <p class="section-title">Dados Pessoais</p>
        <div class="form-grid">
          <div class="field">
            <label>Nome Completo <span class="req">*</span></label>
            <input type="text" id="inp-nome" placeholder="Ex: Dr. Roberto Almeida" />
          </div>
          <div class="field">
            <label>CPF <span class="req">*</span></label>
            <input type="text" id="inp-cpf" placeholder="000.000.000-00" />
          </div>
          <div class="field">
            <label>Data de Nascimento <span class="req">*</label>
            <input type="date" id="inp-dataNascimento" />
          </div>
        </div>
      </div>

      <div class="form-section" id="access-data-section">
        <p class="section-title">Dados de Acesso ao Sistema</p>
        <div class="form-grid">
          <div class="field">
            <label>ID de Usuário <span class="req">*</span> <small style="color: #64748b;">(Automático via
                Sistema)</small></label>
            <input type="text" id="inp-usuario" placeholder="Preenchido automaticamente" readonly
              style="background:#f8fafc; color:#94a3b8;" />
          </div>
          <div class="field">
            <label>Senha Provisória <span class="req">*</span></label>
            <div class="field-group">
              <input type="text" id="inp-senha" placeholder="Digite ou gere uma senha" />
              <button type="button" id="btn-gerar-senha" class="gen-btn">Gerar</button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <p class="section-title">Informações Profissionais</p>
        <div class="form-grid">
          <div class="field">
            <label>Especialidade <span class="req">*</span></label>
            <div class="specialty-wrap">
              <input type="text" id="spec-input" placeholder="Digite para buscar especialidades..."
                autocomplete="off" />
              <div class="specialty-dropdown" id="spec-dropdown"></div>
            </div>
            <div class="tags" id="spec-tags"></div>
          </div>
          <div class="field">
            <label>Registro Profissional <span class="req">*</span></label>
            <input type="text" id="inp-registro" placeholder="Ex: CRM-SP 123456" />
          </div>
          </div>
      </div>

      <div class="form-section">
        <div class="pj-toggle-row">
          <p class="section-title">Pessoa Jurídica (PJ)</p>
          <label class="toggle-label">
            <input type="checkbox" id="pj-check" />
            <div class="toggle-track">
              <div class="toggle-thumb"></div>
            </div>
            <span>Profissional atua como PJ</span>
          </label>
        </div>
        <div class="form-grid pj-fields" id="pj-fields">
          <div class="field">
            <label>CNPJ <span class="req">*</span></label>
            <input type="text" id="inp-cnpj" placeholder="00.000.000/0000-00" />
          </div>
          <div class="field">
            <label>Razão Social <span class="req">*</span></label>
            <input type="text" id="inp-razaoSocial" placeholder="Ex: Roberto Almeida Serviços Médicos LTDA" />
          </div>
          <div class="field">
            <label>Nome Fantasia</label>
            <input type="text" id="inp-nomeFantasia" placeholder="Ex: Clínica Dr. Roberto" />
          </div>
          <div class="field">
            <label>Inscrição Estadual</label>
            <input type="text" id="inp-inscricaoEstadual" placeholder="000.000.000.000" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <p class="section-title">Contato</p>
        <div class="form-grid">
          <div class="field">
            <label>E-mail <span class="req">*</span></label>
            <input type="email" id="inp-email" placeholder="profissional@email.com" />
          </div>
          <div class="field">
            <label>Telefone <span class="req">*</span></label>
            <input type="text" id="inp-tel" placeholder="(11) 98765-4321" />
          </div>
          <div class="field form-col-2 address-group">
            <label>Endereço</label>
            <div class="field-group" style="flex-direction:column; gap:8px;">
              <div class="field">
                <label>CEP <span class="req">*</span></label>
                <input type="text" id="inp-cep" placeholder="00000-000" />
              </div>
              <div class="field">
                <label>Rua/Logradouro <span class="req">*</span></label>
                <input type="text" id="inp-rua" placeholder="Ex: Rua das Flores" />
              </div>
              <div class="field-group">
                <div class="field" style="flex:1">
                  <label>Número <span class="req">*</span></label>
                  <input type="text" id="inp-numero" placeholder="123" />
                </div>
                <div class="field" style="flex:2">
                  <label>Complemento</label>
                  <input type="text" id="inp-complemento" placeholder="Apto, bloco, sala..." />
                </div>
              </div>
              <div class="field-group">
                <div class="field" style="flex:1">
                  <label>Bairro <span class="req">*</span></label>
                  <input type="text" id="inp-bairro" placeholder="Bairro" />
                </div>
                <div class="field" style="flex:1">
                  <label>Cidade <span class="req">*</span></label>
                  <input type="text" id="inp-cidade" placeholder="Cidade" />
                </div>
                <div class="field" style="flex:0 0 120px">
                  <label>Estado/UF <span class="req">*</span></label>
                  <input type="text" id="inp-estado" placeholder="SP" maxlength="2" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="form-message" style="max-width:920px;margin:12px auto;color:#b91c1c;font-weight:600;"></div>

  <script type="module" src="./js/cadastro_profissional.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Profissionais — Coordenação APAE</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../css/gisa.css" />
  <style>
    .loader {
      display: none;
      text-align: center;
      color: var(--muted);
      padding: 2rem 0;
      font-weight: 500;
    }

    .loader.show {
      display: block;
    }

    /* ── PAGINAÇÃO ── */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .pagination button {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      transition: background .15s, border-color .15s;
    }

    .pagination button:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--accent);
    }

    .pagination button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }


    .table-wrap {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    .cards-list {
      display: none;
    }

    /* oculto no desktop */

    @media (max-width: 640px) {
      .table-wrap {
        display: none;
      }

      /* tabela some */
      .cards-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 16px 16px;
      }
    }

    .prof-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px 10px;
      background: var(--surface);
      transition: border-color .15s;
    }

    .prof-card:hover {
      border-color: var(--accent);
    }

    .pc-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .pc-name {
      flex: 1;
      min-width: 0;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pc-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin-bottom: 10px;
    }

    .pc-field {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .pc-label {
      font-size: 10px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .pc-value {
      font-size: 12.5px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pc-footer {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 380px) {
      .pc-details {
        grid-template-columns: 1fr;
      }

      .pc-name {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <a class="back-btn" href="dashboard.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          <span>Voltar</span>
        </a>
        <div>
          <h1>Gestão de Profissionais</h1>
          <p>Gerenciar corpo clínico</p>
        </div>
      </div>
      <a class="new-btn" href="cadastro_profissional.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        <span>Novo Profissional</span>
      </a>
    </div>
  </header>

  <main>
    <div class="card">

      <!-- Busca -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input class="search-input" id="search" type="text" placeholder="Buscar por nome ou especialidade..." />
        </div>
      </div>

      <!-- Contagem -->
      <div class="stats-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Total: <strong id="count">0 profissionais</strong>
      </div>

      <!-- Loader -->
      <div id="loader" class="loader">Carregando profissionais...</div>

      <!-- ── DESKTOP: tabela ── -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Profissional</th>
              <th>Especialidade</th>
              <th class="col-registro">Registro</th>
              <th class="col-email">Contato</th>
              <th>Status</th>
              <th class="right">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <!-- ── MOBILE: cards ── -->
      <div class="cards-list" id="cards-list"></div>

      <!-- Empty state (compartilhado) -->
      <div class="empty" id="empty">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>
        <p>Nenhum profissional encontrado para "<span id="empty-term"></span>"</p>
      </div>

      <!-- Paginação -->
      <div class="pagination" id="pagination">
        <button id="prevPage" type="button" disabled>Anterior</button>
        <button id="nextPage" type="button" disabled>Próximo</button>
      </div>

    </div>
  </main>

  <script type="module" src="./js/gestao_profissionais.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Profissionais — Coordenação APAE</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/gisa.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <a class="back-btn" href="dashboard.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Voltar
      </a>
      <div>
        <h1>Gestão de Profissionais</h1>
        <p>Gerenciar corpo clínico</p>
      </div>
    </div>
    <a class="new-btn" href="cadastro_profissional.html">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Novo Profissional
    </a>
  </div>
</header>

<main>
  <div class="card">

    <!-- Barra de busca -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="search" type="text"
          placeholder="Buscar por nome ou especialidade..."
          oninput="filterTable()" />
      </div>
    </div>

    <!-- Contador -->
    <div class="stats-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Total: <strong id="count">6 profissionais</strong>
    </div>

    <!-- Tabela -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Profissional</th>
            <th>Especialidade</th>
            <th class="col-registro">Registro</th>
            <th class="col-email">Contato</th>
            <th>Status</th>
            <th class="right">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <p>Nenhum profissional encontrado para "<span id="empty-term"></span>"</p>
      </div>
    </div>

  </div>
</main>

<script>
  const professionals = [
    { id: 1, name: 'Dr. Roberto Almeida',   specialty: 'Neurologista Pediátrico',               crm: 'CRM-SP 123456',          email: 'roberto.almeida@apae.org'  },
    { id: 2, name: 'Dra. Fernanda Lima',     specialty: 'Fisioterapeuta',                        crm: 'CREFITO-3 45678',        email: 'fernanda.lima@apae.org'    },
    { id: 3, name: 'Dra. Juliana Mendes',    specialty: 'Fonoaudióloga',                         crm: 'CRFa 2-12345',           email: 'juliana.mendes@apae.org'   },
    { id: 4, name: 'Dr. Carlos Eduardo',     specialty: 'Psicólogo',                             crm: 'CRP 06/98765',           email: 'carlos.eduardo@apae.org'   },
    { id: 5, name: 'Dra. Patricia Santos',   specialty: 'Terapeuta Ocupacional',                 crm: 'CREFITO-3 67890',        email: 'patricia.santos@apae.org'  },
    { id: 6, name: 'Dr. Marcos Vieira',      specialty: 'Neurologista Pediátrico, Psiquiatra',   crm: 'CRM-SP 234567',          email: 'marcos.vieira@apae.org'    },
  ];

  function initials(name) {
    return name.replace(/^Dr[a]?\.\s*/i, '').split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
  }

  function renderTable(list) {
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');

    if (list.length === 0) {
      tbody.innerHTML = '';
      empty.classList.add('show');
      document.getElementById('empty-term').textContent = document.getElementById('search').value;
      document.getElementById('count').textContent = '0 profissionais';
      return;
    }

    empty.classList.remove('show');
    document.getElementById('count').textContent = `${list.length} profissiona${list.length === 1 ? 'l' : 'is'}`;

    tbody.innerHTML = list.map(p => `
      <tr>
        <td>
          <div class="prof-cell">
            <div class="avatar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <span class="prof-name">${p.name}</span>
          </div>
        </td>
        <td>${p.specialty}</td>
        <td class="muted col-registro">${p.crm}</td>
        <td class="muted col-email">${p.email}</td>
        <td><span class="badge green">Ativo</span></td>
        <td class="right">
          <div class="actions">
            <button class="act-btn" title="Visualizar">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
            <button class="act-btn" title="Editar">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="act-btn danger" title="Excluir">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = professionals.filter(p =>
      p.name.toLowerCase().includes(q) || p.specialty.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  renderTable(professionals);
</script>

</body>
</html>

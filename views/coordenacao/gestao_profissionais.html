<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Profissionais — Coordenação APAE</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../css/gisa.css" />
  <style>
    .loader {
      display: none;
      text-align: center;
      color: var(--muted);
      padding: 2rem 0;
      font-weight: 500;
    }

    .loader.show {
      display: block;
    }

    /* ── PAGINAÇÃO ── */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .pagination button {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      transition: background .15s, border-color .15s;
    }

    .pagination button:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--accent);
    }

    .pagination button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }


    .table-wrap {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    .cards-list {
      display: none;
    }

    /* oculto no desktop */

    @media (max-width: 640px) {
      .table-wrap {
        display: none;
      }

      /* tabela some */
      .cards-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 16px 16px;
      }
    }

    .prof-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px 10px;
      background: var(--surface);
      transition: border-color .15s;
    }

    .prof-card:hover {
      border-color: var(--accent);
    }

    .pc-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .pc-name {
      flex: 1;
      min-width: 0;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pc-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin-bottom: 10px;
    }

    .pc-field {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .pc-label {
      font-size: 10px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .pc-value {
      font-size: 12.5px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pc-footer {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 380px) {
      .pc-details {
        grid-template-columns: 1fr;
      }

      .pc-name {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <a class="back-btn" href="dashboard.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          <span>Voltar</span>
        </a>
        <div>
          <h1>Gestão de Profissionais</h1>
          <p>Gerenciar corpo clínico</p>
        </div>
      </div>
      <a class="new-btn" href="cadastro_profissional.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        <span>Novo Profissional</span>
      </a>
    </div>
  </header>

  <main>
    <div class="card">

      <!-- Busca -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input class="search-input" id="search" type="text" placeholder="Buscar por nome ou especialidade..." />
        </div>
      </div>

      <!-- Contagem -->
      <div class="stats-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Total: <strong id="count">0 profissionais</strong>
      </div>

      <!-- Loader -->
      <div id="loader" class="loader">Carregando profissionais...</div>

      <!-- ── DESKTOP: tabela ── -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Profissional</th>
              <th>Especialidade</th>
              <th class="col-registro">Registro</th>
              <th class="col-email">Contato</th>
              <th>Status</th>
              <th class="right">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <!-- ── MOBILE: cards ── -->
      <div class="cards-list" id="cards-list"></div>

      <!-- Empty state (compartilhado) -->
      <div class="empty" id="empty">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>
        <p>Nenhum profissional encontrado para "<span id="empty-term"></span>"</p>
      </div>

      <!-- Paginação -->
      <div class="pagination" id="pagination">
        <button id="prevPage" type="button" disabled>Anterior</button>
        <button id="nextPage" type="button" disabled>Próximo</button>
      </div>

    </div>
  </main>

  <script>
    /* ================================================================
       DADOS MOCK — substitua por fetch() à API quando o backend estiver pronto
    ================================================================ */
    const PROFISSIONAIS_MOCK = [
      { id: '1', nome: 'Dr. Roberto Almeida', especialidades: [{ nome: 'Neurologista Pediátrico' }], registroProfissional: 'CRM-SP 123456', email: 'r.almeida@apae.org.br', status: 'Ativo' },
      { id: '2', nome: 'Dra. Fernanda Costa', especialidades: [{ nome: 'Psicóloga' }], registroProfissional: 'CRP-SP 654321', email: 'f.costa@apae.org.br', status: 'Ativo' },
      { id: '3', nome: 'Dr. Marcos Vieira', especialidades: [{ nome: 'Psiquiatra' }], registroProfissional: 'CRM-SP 789012', email: 'm.vieira@apae.org.br', status: 'Ativo' },
      { id: '4', nome: 'Ana Paula Lima', especialidades: [{ nome: 'Fisioterapeuta' }], registroProfissional: 'CREFITO-SP 11223', email: 'a.lima@apae.org.br', status: 'Ativo' },
      { id: '5', nome: 'Dr. Carlos Eduardo', especialidades: [{ nome: 'Fonoaudiólogo' }], registroProfissional: 'CFFa-SP 55678', email: 'c.eduardo@apae.org.br', status: 'Ativo' }
    ];

    /* ── SVGs dos botões de ação ── */
    const SVG_VIEW = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const SVG_EDIT = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    const SVG_DEL = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

    let professionals = [...PROFISSIONAIS_MOCK];

    /* Escapa HTML para evitar XSS */
    function esc(v) {
      return String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* Iniciais para o avatar */
    function initials(name) {
      return String(name || '').replace(/^Dr[a]?\.\s*/i, '').split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase();
    }

    /* Constrói os botões de ação e registra o evento de exclusão */
    function actionButtons(id) {
      const wrap = document.createElement('div');
      wrap.className = 'actions';
      wrap.innerHTML = `
      <button class="act-btn" title="Visualizar">${SVG_VIEW}</button>
      <button class="act-btn" title="Editar">${SVG_EDIT}</button>
      <button class="act-btn danger" title="Excluir" data-id="${esc(id)}">${SVG_DEL}</button>`;
      wrap.querySelector('.danger').addEventListener('click', () => deleteProfissional(id));
      return wrap;
    }

    /* Exclui da lista mock e re-renderiza */
    function deleteProfissional(id) {
      if (!confirm('Confirma exclusão deste profissional?')) return;
      professionals = professionals.filter(p => p.id !== id);
      filterTable();
    }

    /* ── Renderiza TABELA (desktop) ── */
    function renderTabela(list) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = list.map(p => {
        const esp = Array.isArray(p.especialidades) ? p.especialidades.map(e => e?.nome || '').join(', ') : '';
        const badge = p.status === 'Ativo' ? 'green' : 'badge-gray';
        return `
        <tr data-id="${esc(p.id)}">
          <td>
            <div class="prof-cell">
              <div class="avatar">${esc(initials(p.nome))}</div>
              <span class="prof-name">${esc(p.nome)}</span>
            </div>
          </td>
          <td>${esc(esp)}</td>
          <td class="muted col-registro">${esc(p.registroProfissional)}</td>
          <td class="muted col-email">${esc(p.email)}</td>
          <td><span class="badge dot ${badge}">${esc(p.status)}</span></td>
          <td class="right" data-actions="${esc(p.id)}"></td>
        </tr>`;
      }).join('');

      /* Injeta botões com eventos (não dá para fazer inline com addEventListener) */
      list.forEach(p => {
        const cell = tbody.querySelector(`[data-actions="${esc(p.id)}"]`);
        if (cell) cell.appendChild(actionButtons(p.id));
      });
    }

    /* ── Renderiza CARDS (mobile) ── */
    function renderCards(list) {
      const container = document.getElementById('cards-list');
      container.innerHTML = '';

      list.forEach(p => {
        const esp = Array.isArray(p.especialidades) ? p.especialidades.map(e => e?.nome || '').join(', ') : '';
        const badge = p.status === 'Ativo' ? 'green' : 'badge-gray';

        const card = document.createElement('div');
        card.className = 'prof-card';
        card.innerHTML = `
        <div class="pc-top">
          <div class="avatar">${esc(initials(p.nome))}</div>
          <span class="pc-name">${esc(p.nome)}</span>
          <span class="badge dot ${badge}">${esc(p.status)}</span>
        </div>
        <div class="pc-details">
          <div class="pc-field">
            <span class="pc-label">Especialidade</span>
            <span class="pc-value">${esc(esp)}</span>
          </div>
          <div class="pc-field">
            <span class="pc-label">Registro</span>
            <span class="pc-value">${esc(p.registroProfissional)}</span>
          </div>
          <div class="pc-field">
            <span class="pc-label">E-mail</span>
            <span class="pc-value">${esc(p.email)}</span>
          </div>
        </div>
        <div class="pc-footer" data-actions="${esc(p.id)}"></div>`;

        card.querySelector('.pc-footer').appendChild(actionButtons(p.id));
        container.appendChild(card);
      });
    }

    /* ── Renderiza ambos (tabela + cards) e controla empty state ── */
    function renderAll(list) {
      const empty = document.getElementById('empty');

      if (!list || list.length === 0) {
        document.getElementById('tbody').innerHTML = '';
        document.getElementById('cards-list').innerHTML = '';
        empty.classList.add('show');
        document.getElementById('empty-term').textContent = document.getElementById('search').value;
        document.getElementById('count').textContent = '0 profissionais';
        return;
      }

      empty.classList.remove('show');
      document.getElementById('count').textContent =
        `${list.length} profissiona${list.length === 1 ? 'l' : 'is'}`;

      renderTabela(list);
      renderCards(list);    /* mobile  */
    }

    /* ── Filtra pelo texto de busca ── */
    function filterTable() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = q
        ? professionals.filter(p => {
          const esp = Array.isArray(p.especialidades)
            ? p.especialidades.map(e => e?.nome || '').join(' ').toLowerCase() : '';
          return (p.nome || '').toLowerCase().includes(q) || esp.includes(q);
        })
        : professionals;
      renderAll(filtered);
    }

    /* ── Init ── */
    window.addEventListener('DOMContentLoaded', () => {
      renderAll(professionals);
      document.getElementById('prevPage').disabled = true;
      document.getElementById('nextPage').disabled = true;
      document.getElementById('search').addEventListener('input', filterTable);
    });
  </script>

</body>

</html>
